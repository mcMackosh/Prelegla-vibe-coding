services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: "file:./dev.db"
      PORT: "3001"
      FRONTEND_ORIGIN: "http://localhost:3000"
      OPENROUTER_MODEL: "openai/gpt-oss-20b:free"
      JWT_SECRET: "dev-insecure-secret-change-me"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
